<svg viewBox="0 0 400 120" xmlns="http://www.w3.org/2000/svg">
  <!-- Bright Ops logo: orange outlined cube + text -->
  <g transform="translate(10,5)">
    <!-- Outer hexagon outline -->
    <polygon points="55,5 100,31 100,82 55,108 10,82 10,31" 
      fill="none" stroke="#F07A1A" stroke-width="6" stroke-linejoin="round"/>
    <!-- Inner cube lines -->
    <line x1="55" y1="5" x2="55" y2="56" stroke="#F07A1A" stroke-width="6" stroke-linecap="round"/>
    <line x1="55" y1="56" x2="10" y2="82" stroke="#F07A1A" stroke-width="6" stroke-linecap="round"/>
    <line x1="55" y1="56" x2="100" y2="82" stroke="#F07A1A" stroke-width="6" stroke-linecap="round"/>
  </g>
  <!-- Text -->
  <text x="135" y="74" font-family="'Inter', 'Segoe UI', Arial, sans-serif" font-size="48" font-weight="600" fill="#333333">
    Bright Ops
  </text>
</svg>
